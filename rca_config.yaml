# =============================================================================
# RCA Pocket - Configuração Central
# Edite este arquivo para personalizar sem mexer no código Python.
# =============================================================================

jira:
  base_url: "https://jira.linx.com.br"
  # Token  prioridade de leitura:
  #   1. Variável de ambiente JIRA_API_TOKEN  <- injetada pela pipeline via Azure Key Vault
  #      (MVXDEV-KEYVAULT > jira-api-token-robot, task AzureKeyVault@2 em parameters.yaml)
  #   2. Campo "token" abaixo                 <- uso local em desenvolvimento
  #   3. "SEU_TOKEN_AQUI" (valor padrão)      <- ativa modo MOCK automaticamente
  # Para gerar PAT local: Jira > Perfil > Personal Access Tokens
  token: "SEU_TOKEN_AQUI"
  auth_type: "pat"
  filter_id: "62693"
  # Campos mínimos para reduzir payload na API (economiza recursos do DC)
  fields:
    - summary
    - status
    - priority
    - labels
    - assignee
    - created
    - updated
    - description
    - resolution
    - resolutiondate
    - comment        # últimos comentários — usado para preencher "Ação Realizada no Bug"
  max_results_per_page: 100

cache:
  pasta: "data"
  arquivo_cache: "data/issues_cache.json"
  arquivo_ultima_sync: "data/last_sync.txt"
  # D+1: script roda segunda à noite; delta busca apenas issues atualizadas
  delta_update: true
  # Paralelismo na paginação: busca todas as páginas simultaneamente (máx. 4 workers)
  # Útil para volumes > 500 issues. Manter false em ambientes com rate limit rigoroso.
  parallel_pagination: false

excel:
  arquivo_saida: "RCA_Pocket.xlsx"
  # URL do Excel Online no SharePoint (com ?web=1 para forçar abertura no browser)
  # Exemplo: https://suaempresa.sharepoint.com/sites/QA/RCA_Pocket.xlsx?web=1
  # Deixe vazio enquanto o arquivo ainda nao estiver no SharePoint
  sharepoint_url: ""

