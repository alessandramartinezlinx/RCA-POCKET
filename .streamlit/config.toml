[theme]
# Permite ao usuário escolher entre modo claro e escuro
# Apenas definimos a cor primária para manter identidade visual
primaryColor = "#2E75B6"

[server]
headless = true
enableXsrfProtection = false
enableCORS = false

# Importante para embeds funcionarem
[runner]
magicEnabled = true

[browser]
gatherUsageStats = false
