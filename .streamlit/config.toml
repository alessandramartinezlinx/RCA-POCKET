[theme]
# Tema padrão escuro para alinhar com o dashboard e com os gráficos Plotly.
base = "dark"
primaryColor = "#2E75B6"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#182028"
textColor = "#FAFAFA"

[server]
headless = true
enableXsrfProtection = false
enableCORS = false

# Importante para embeds funcionarem
[runner]
magicEnabled = true

[browser]
gatherUsageStats = false
